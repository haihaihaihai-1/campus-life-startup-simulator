name: Build CampusLife Mod

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 8
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '8'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build
        run: ./gradlew build --no-daemon --stacktrace
        env:
          GRADLE_OPTS: "-Xmx4g -Dfile.encoding=UTF-8"

      - name: Show error log on failure
        if: failure()
        run: |
          echo "=== Compile errors ==="
          find . -name "*.log" -path "*/logs/*" -exec tail -100 {} \;
          echo "=== Build output dir ==="
          find ./build -type f 2>/dev/null | head -20

      - name: Upload JAR artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: campuslife-mod-jar
          path: build/libs/*.jar
          retention-days: 30

      - name: Create Release on tag
        if: success() && startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: build/libs/*.jar
          generate_release_notes: true
